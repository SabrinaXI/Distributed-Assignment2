<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FamilyHelpUAE Login</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h1>FamilyHelpUAE</h1>
    <h2>Login</h2>

    <form action="/login" method="POST" class="card">

        <input type="email"
               name="username"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">Login</button>

    </form>

    <p>New family?</p>

    <a href="register.html">
        Create an account
    </a>

</div>

</body>
</html>
