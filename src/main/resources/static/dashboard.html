<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FamilyHelpUAE Dashboard</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h1>FamilyHelpUAE Dashboard</h1>

    <p id="message"></p>


    <section class="card">

        <h2>Update Family Profile</h2>

        <input type="number"
               id="familyId"
               placeholder="Family ID">

        <input type="text"
               id="familyNameUpdate"
               placeholder="Family Name">

        <input type="text"
               id="phoneNumberUpdate"
               placeholder="Phone Number">

        <input type="text"
               id="cityUpdate"
               placeholder="City">

        <input type="text"
               id="addressUpdate"
               placeholder="Address">

        <input type="text"
               id="bioUpdate"
               placeholder="Bio">

        <input type="number"
               id="membersUpdate"
               placeholder="Number Of Members">

        <button onclick="updateFamily()">
            Update Family
        </button>

    </section>


    <section class="card">

        <h2>Create Help Offer</h2>

        <input type="number"
               id="offerFamilyId"
               placeholder="Family ID">

        <input type="text"
               id="offerTitle"
               placeholder="Title">

        <input type="text"
               id="offerDescription"
               placeholder="Description">

        <input type="text"
               id="offerCategory"
               placeholder="Category">

        <input type="text"
               id="offerAvailability"
               placeholder="Availability">

        <button onclick="createHelpOffer()">
            Post Help Offer
        </button>

    </section>

    <section class="card">

        <h2>View Help Offers</h2>

        <button onclick="getHelpOffers()">
            Load Offers
        </button>

        <div id="offersList"></div>

    </section>

    <section class="card">

        <h2>Update Help Offer</h2>

        <input type="number"
               id="updateOfferId"
               placeholder="Offer ID">

        <input type="text"
               id="updateOfferTitle"
               placeholder="New Title">

        <input type="text"
               id="updateOfferDescription"
               placeholder="New Description">

        <input type="text"
               id="updateOfferCategory"
               placeholder="New Category">

        <input type="text"
               id="updateOfferAvailability"
               placeholder="New Availability">

        <button onclick="updateHelpOffer()">
            Update Offer
        </button>

    </section>

    <section class="card">

        <h2>Delete Help Offer</h2>

        <input type="number"
               id="deleteOfferId"
               placeholder="Offer ID">

        <button onclick="deleteHelpOffer()">
            Delete Offer
        </button>

    </section>

    <!-- EMERGENCY REQUEST -->

    <section class="card emergency">

        <h2>Create Emergency Request</h2>

        <input type="number"
               id="emergencyFamilyId"
               placeholder="Family ID">

        <input type="text"
               id="emergencyTitle"
               placeholder="Emergency Title">

        <input type="text"
               id="emergencyLocation"
               placeholder="Location">

        <button onclick="createEmergencyRequest()">
            Create Emergency
        </button>

    </section>

    <section class="card emergency">

        <h2>View Emergency Requests</h2>

        <button onclick="getAllEmergencies()">
            Load All Emergencies
        </button>

        <button onclick="getOpenEmergencies()">
            Load Open Emergencies
        </button>

        <div id="emergencyList"></div>

    </section>

    <section class="card emergency">

        <h2>Resolve Emergency Request</h2>

        <input type="number"
               id="resolveEmergencyId"
               placeholder="Emergency Request ID">

        <button onclick="resolveEmergencyRequest()">
            Resolve Emergency
        </button>

    </section>

</div>

<script src="/js/app.js"></script>
</body>
</html>
