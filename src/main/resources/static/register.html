<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register Family</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h1>Register Family</h1>

    <form id="registerForm" class="card">

        <input type="text"
               id="familyName"
               placeholder="Family Name"
               required>

        <input type="email"
               id="email"
               placeholder="Email"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <input type="text"
               id="phoneNumber"
               placeholder="Phone Number">

        <input type="text"
               id="city"
               placeholder="City">

        <input type="text"
               id="address"
               placeholder="Address">

        <input type="text"
               id="bio"
               placeholder="Bio">

        <input type="number"
               id="numberOfMembers"
               placeholder="Number Of Members">

        <button type="submit">
            Register
        </button>

    </form>

    <p id="registerMessage"></p>

    <a href="login.html">
        Already have an account? Login
    </a>

</div>

<script src="/js/app.js"></script>
</body>
</html>
