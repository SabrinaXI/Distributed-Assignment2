<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-center">
            <a href="/dashboard.html">Homepage</a>
            <a href="/help-offer.html">Offer Help</a>
            <a href="/ask-help.html">Ask for Help</a>
            <a href="/my-tasks.html">My Tasks</a>
            <a href="/profile.html">My Profile</a>
        </div>

        <button id="logoutBtn">Logout</button>
    </nav>

    <main class="page-container">

        <section class="profile-card">

            <h1>My Profile</h1>

            <div class="profile-info">

                <div class="info-item">
                    <span class="label">Family Name</span>
                    <span id="familyName"></span>
                </div>

                <div class="info-item">
                    <span class="label">Email</span>
                    <span id="email"></span>
                </div>

                <div class="info-item">
                    <span class="label">Phone Number</span>
                    <span id="phoneNumber"></span>
                </div>

                <div class="info-item">
                    <span class="label">City</span>
                    <span id="city"></span>
                </div>

                <div class="info-item">
                    <span class="label">Address</span>
                    <span id="address"></span>
                </div>

                <div class="info-item">
                    <span class="label">Bio</span>
                    <span id="bio"></span>
                </div>

                <div class="info-item">
                    <span class="label">Number of Members</span>
                    <span id="numberOfMembers"></span>
                </div>

                <div class="info-item">
                    <span class="label">Average Rating</span>
                    <span id="averageRating"></span>
                </div>

                <div class="info-item">
                    <span class="label">Completed Tasks</span>
                    <span id="completedTasks"></span>
                </div>

                <div class="info-item">
                    <span class="label">Trust Score</span>
                    <span id="trustScore"></span>
                </div>

            </div>

        </section>

    </main>

    <script src="/js/profile.js"></script>

</body>

</html>
